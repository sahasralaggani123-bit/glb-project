<!DOCTYPE html>
<html>

<head>
    <title>AI Stylist - KB's</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <!-- Logo -->
        <div class="nav-left">
            <a href="index.html" class="logo-circle">
                <img src="logo.png">
            </a>
        </div>

        <!-- Navigation Links -->
        <div class="nav-center">
            <a href="index.html">Home</a>
            <a href="collections.html">Collections</a>
            <a href="ai-stylist.html">AI Stylist</a>
            <a href="custom-fit.html">Custom Fit</a>
            <a href="delivery.html">Delivery</a>
            <a href="orders.html">Orders</a>
        </div>

        <!-- Right Section -->
        <div class="nav-right">

            <!-- Search -->
            <div class="search-wrap">
                <input id="globalSearch" placeholder="Search products">
                <div id="searchSuggestions" class="suggestions"></div>
            </div>

            <!-- Wishlist -->
            <a class="icon-link" href="wishlist.html">
                <i class="fa-regular fa-heart"></i>
                <span class="badge wishlist-count">0</span>
            </a>

            <!-- Cart -->
            <a class="icon-link cart-link" href="cart.html">
                <i class="fa-solid fa-bucket"></i>
                <span class="badge cart-count">0</span>
            </a>

            <!-- Login -->
            <a href="login.html">Login / Profile</a>

        </div>

    </nav>


    <!-- MAIN CONTENT -->
    <main>

        <h2>AI Stylist Recommendations</h2>

        <!-- FORM -->
        <section class="glass-card">

            <form id="stylistForm" class="form-grid">

                <select name="occasion">
                    <option>Wedding</option>
                    <option>Festive</option>
                    <option>Casual</option>
                    <option>Reception</option>
                </select>

                <select name="preferredColor">
                    <option>Red</option>
                    <option>Green</option>
                    <option>Blue</option>
                    <option>Gold</option>
                </select>

                <select name="fabric">
                    <option>Any</option>
                    <option>Cotton</option>
                    <option>Silk</option>
                    <option>Linen</option>
                    <option>Satin</option>
                    <option>Velvet</option>
                </select>

                <input
                    name="budget"
                    type="number"
                    placeholder="Budget in ₹"
                >

                <select name="bodyType">
                    <option>Pear</option>
                    <option>Hourglass</option>
                    <option>Athletic</option>
                    <option>Petite</option>
                </select>

                <button>Get Recommendations</button>

            </form>

        </section>


        <!-- RESULTS -->
        <section id="stylistResults" class="product-grid"></section>

    </main>


    <!-- Script -->
    <script src="script.js"></script>

</body>
</html>

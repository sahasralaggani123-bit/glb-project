<!DOCTYPE html>
<html>

<head>
    <title>Cart - KB's</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <!-- Logo -->
        <div class="nav-left">
            <a href="index.html" class="logo-circle">
                <img src="logo.png">
            </a>
        </div>

        <!-- Navigation Links -->
        <div class="nav-center">
            <a href="index.html">Home</a>
            <a href="collections.html">Collections</a>
            <a href="ai-stylist.html">AI Stylist</a>
            <a href="custom-fit.html">Custom Fit</a>
            <a href="delivery.html">Delivery</a>
            <a href="orders.html">Orders</a>
        </div>

        <!-- Right Section -->
        <div class="nav-right">

            <!-- Search -->
            <div class="search-wrap">
                <input id="globalSearch" placeholder="Search products">
                <div id="searchSuggestions" class="suggestions"></div>
            </div>

            <!-- Wishlist -->
            <a class="icon-link" href="wishlist.html">
                <i class="fa-regular fa-heart"></i>
                <span class="badge wishlist-count">0</span>
            </a>

            <!-- Cart -->
            <a class="icon-link cart-link" href="cart.html">
                <i class="fa-solid fa-bucket"></i>
                <span class="badge cart-count">0</span>
            </a>

            <!-- Login -->
            <a href="login.html">Login / Profile</a>

        </div>

    </nav>


    <!-- MAIN CART SECTION -->
    <main>

        <h2>Your Cart</h2>

        <!-- CART ITEMS -->
        <section id="cartItems"></section>


        <!-- CART SUMMARY -->
        <aside class="cart-summary">

            <h3>Summary</h3>

            <p>
                Subtotal:
                <span id="subTotal">₹0</span>
            </p>

            <p>
                Delivery:
                <span id="deliveryFee">₹0</span>
            </p>

            <p>
                Discount:
                <span id="discount">₹0</span>
            </p>

            <p>
                <strong>
                    Final Total:
                    <span id="finalTotal">₹0</span>
                </strong>
            </p>

            <!-- Coupon Input -->
            <input
                id="couponCode"
                placeholder="Coupon code (WELCOME10 / FASHION20 / BRIDAL15)"
            >

            <!-- Apply Coupon -->
            <button id="applyCoupon">
                Apply Coupon
            </button>

            <!-- Checkout Button -->
            <a class="btn"
               href="checkout.html"
               style="display:inline-block; margin-top:8px; text-decoration:none">
               Proceed to Checkout
            </a>

        </aside>

    </main>


    <!-- Script -->
    <script src="script.js"></script>

</body>

</html>
